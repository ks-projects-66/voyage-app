.app{font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100vh;max-width:520px;margin:0 auto;position:relative;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
.scroll-wrap{display:flex;flex-direction:column;min-height:100vh;}
.mono,.stat-v,.daychip-num,.dc-num{font-variant-numeric:tabular-nums;}
.topbar{position:sticky;top:0;z-index:20;background:rgba(242,242,247,.82);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);padding:18px 20px 12px;}
.topbar-row{display:flex;justify-content:space-between;align-items:center;gap:10px;}
.kicker{font-size:11px;letter-spacing:.02em;color:var(--muted);font-weight:600;}
.brandline{font-family:var(--serif);font-size:26px;font-weight:700;letter-spacing:-.025em;line-height:1;margin-top:3px;color:var(--ink);}
.brandline.mid{font-size:18px;text-align:center;}
.brand-mid{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.crumb{display:inline-flex;align-items:center;gap:2px;background:none;color:var(--accent);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--sans);padding:4px 2px;flex:none;}
.sharetop{display:inline-flex;align-items:center;gap:5px;background:var(--fill);color:var(--accent);border-radius:12px;padding:8px 10px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:var(--sans);flex:none;}
.wiztitle,.wiztitle{font-family:var(--serif);font-weight:700;}
.wiztitle{font-size:18px;}
.daychip{display:flex;align-items:baseline;gap:4px;flex:none;}
.daychip-num{font-size:17px;font-weight:600;color:var(--ink);letter-spacing:-.01em;}
.daychip-of{font-size:12px;color:var(--muted);}
.progress{height:3px;background:var(--fill2);margin-top:14px;border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .6s cubic-bezier(.2,.8,.2,1);}
.syncrow{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
.syncnote{font-size:11px;color:var(--muted);}
.syncnote.warn{color:#B25000;font-weight:600;}
.syncbtn{display:inline-flex;align-items:center;gap:4px;background:transparent;color:#B25000;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--sans);}
.signout{display:inline-flex;align-items:center;gap:5px;background:none;color:var(--accent);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--sans);padding:2px 0;flex:none;}
.scroll{flex:1;overflow-y:auto;position:relative;z-index:2;padding-bottom:90px;}
.scroll.solo{padding-bottom:28px;}
.page{padding:18px 16px 8px;}
.page-h{font-family:var(--serif);font-size:32px;font-weight:700;letter-spacing:-.03em;margin:2px 4px 18px;}
.section-label{font-size:13px;color:var(--muted);font-weight:600;margin:24px 6px 8px;display:flex;align-items:center;gap:6px;}
.section-label .optional{font-weight:500;opacity:.8;}
.card{background:var(--surface);border-radius:18px;padding:16px;margin-bottom:10px;box-shadow:var(--shadow);}
.hero{background:var(--surface);color:var(--ink);border-radius:22px;padding:22px;margin-bottom:12px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;}
.hero-date{font-size:13px;color:var(--muted);font-weight:500;}
.hero-city{font-family:var(--serif);font-size:30px;font-weight:700;line-height:1.04;margin-top:5px;letter-spacing:-.03em;}
.hero-country{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--muted);margin-top:8px;}
.hero-weather{display:flex;flex-direction:column;align-items:flex-end;gap:3px;color:var(--accent);}
.hero-temp{font-size:21px;font-weight:600;color:var(--ink);}
.hero-temp span{font-size:13px;color:var(--muted);font-weight:400;margin-left:3px;}
.wxlive{display:inline-flex;align-items:center;gap:4px;font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#1f9d55;}
.wxdot{width:5px;height:5px;border-radius:50%;background:#1f9d55;}
.homeclock{display:flex;align-items:center;gap:8px;background:var(--surface);border-radius:14px;padding:11px 14px;margin-bottom:12px;box-shadow:var(--shadow);font-size:13px;}
.homeclock svg{color:var(--accent);flex:none;}
.homeclock-l{font-weight:600;color:var(--ink);}
.homeclock-t{margin-left:auto;font-family:var(--mono);color:var(--ink2);font-variant-numeric:tabular-nums;}
.hero-cond{font-size:14px;color:var(--ink2);margin-top:16px;}
.weather-input{margin-top:12px;width:100%;background:var(--fill);color:var(--ink);border-radius:12px;padding:11px 13px;font-size:14px;font-family:var(--sans);}
.weather-input::placeholder{color:var(--muted);}
.weather-input:focus,.inline-input:focus,.quickadd input:focus,.sel:focus,.authinput:focus{outline:none;box-shadow:0 0 0 4px rgba(65,89,156,.14);}
.muted{color:var(--muted);} .sm{font-size:14px;line-height:1.45;} .xs{font-size:12.5px;line-height:1.4;color:var(--muted);}
.reflink{display:inline-flex;align-items:center;gap:6px;margin-top:10px;background:var(--powder);color:var(--accent);border-radius:9px;padding:7px 11px;font-family:var(--mono);font-size:13px;font-weight:500;cursor:pointer;}
.reflink.xs{font-size:12px;padding:5px 9px;margin-top:7px;}
.empty{padding:4px 2px;} .pad{padding:28px 8px;text-align:center;}
.checkrow{display:flex;align-items:flex-start;gap:12px;width:100%;background:none;text-align:left;padding:11px 2px;cursor:pointer;}
.checkrow.sm{padding:9px 0;}
.box{width:23px;height:23px;flex:none;border-radius:50%;background:var(--fill2);display:flex;align-items:center;justify-content:center;color:#fff;margin-top:1px;transition:.18s cubic-bezier(.2,.8,.2,1);}
.checkrow.checked .box{background:var(--accent);}
.checkrow:active .box,.placecheck:active .box{transform:scale(.88);}
.checktext{font-size:15px;line-height:1.4;transition:.15s;}
.checkrow.checked .checktext{color:var(--muted);text-decoration:line-through;}
.quickadd{display:flex;gap:9px;margin-top:12px;}
.quickadd input{flex:1;background:var(--fill);border-radius:12px;padding:11px 13px;font-size:14px;font-family:var(--sans);color:var(--ink);}
.quickadd button{width:42px;flex:none;background:var(--accent);color:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.12s;}
.quickadd button:active,.primary:active,.addday:active{background:var(--accent-d);transform:scale(.96);}
.quickadd button:disabled{opacity:.6;}
.ministats,.journal-stats{display:flex;gap:9px;margin-top:18px;}
.journal-stats.wrap{flex-wrap:wrap;}
.journal-stats.wrap .stat{min-width:72px;}
.stat{flex:1;background:var(--surface);border-radius:14px;padding:14px 8px;text-align:center;box-shadow:var(--shadow);}
.stat-v{font-size:20px;font-weight:700;line-height:1;letter-spacing:-.02em;}
.stat.accent .stat-v{color:var(--accent);}
.stat-l{font-size:11px;color:var(--muted);margin-top:6px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.daycard{background:var(--surface);border-radius:18px;margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow);animation:rise .4s both;}
@keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.daycard.today{background:var(--powder);}
.daycard-head{display:flex;align-items:center;gap:14px;width:100%;background:none;padding:15px;cursor:pointer;text-align:left;}
.daycard-date{width:36px;flex:none;text-align:center;}
.dc-dow{font-size:11px;color:var(--muted);font-weight:500;}
.dc-num{font-size:23px;font-weight:700;line-height:1;color:var(--ink);letter-spacing:-.02em;}
.daycard-main{flex:1;min-width:0;}
.dc-city{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;}
.todaybadge,.split{font-size:10px;background:var(--accent);color:#fff;border-radius:6px;padding:2px 7px;font-weight:600;}
.dc-sub{display:flex;gap:12px;align-items:center;margin-top:5px;}
.tzchip{display:flex;align-items:center;gap:5px;font-size:12.5px;color:var(--muted);font-family:var(--mono);}
.tzline{display:flex;align-items:center;gap:8px;font-size:13.5px;color:var(--ink2);padding:6px 0 12px;}
.tzline svg{color:var(--accent);flex:none;}
.chev{color:var(--muted);transition:transform .25s;}.chev.up{transform:rotate(180deg);}
.daycard-body{padding:0 15px 15px;}
.inline-input{background:var(--fill);border-radius:10px;padding:9px 11px;font-size:14px;font-family:var(--sans);color:var(--ink);margin-top:6px;}
.inline-input.full{width:100%;margin-bottom:8px;}
.addrow{display:flex;gap:9px;margin-bottom:9px;}.vintage{max-width:96px;}
.sel{background:var(--fill);border-radius:12px;padding:0 12px;font-size:14px;font-family:var(--sans);color:var(--ink);font-weight:500;}
.sel.full{width:100%;padding:13px;margin-bottom:9px;}
.primary{width:100%;background:var(--accent);color:#fff;border-radius:14px;padding:14px;font-size:15px;font-weight:600;font-family:var(--sans);display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;margin-top:2px;transition:.12s;}
.primary:disabled{opacity:.5;}
.best{display:flex;align-items:center;gap:10px;background:var(--powder);border-radius:14px;padding:13px 15px;font-size:14px;margin:12px 0;color:var(--ink);}
.best svg{color:var(--accent);flex:none;}
.typetabs{display:flex;gap:0;background:var(--fill);border-radius:12px;padding:3px;margin-bottom:14px;}
.typetab{flex:1;background:transparent;border-radius:9px;padding:9px 4px;font-size:12px;font-family:var(--sans);color:var(--ink2);display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;font-weight:500;transition:.15s;}
.typetab.on{background:var(--surface);color:var(--accent);box-shadow:0 1px 3px rgba(0,0,0,.12);font-weight:600;}
.ratepair{display:flex;flex-direction:column;gap:11px;margin:14px 0;}
.raterow{display:flex;align-items:center;justify-content:space-between;}
.rate-label{font-size:14px;color:var(--ink2);font-weight:500;max-width:55%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}.stars{display:flex;gap:5px;}.starbtn{background:none;cursor:pointer;padding:10px 6px;margin:-9px -4px;transition:.1s;}.starbtn:active{transform:scale(.85);}
.diarygroup{margin-bottom:6px;}
.diaryday{display:flex;align-items:baseline;gap:9px;margin:22px 6px 11px;}
.diaryday-date{font-family:var(--serif);font-size:16px;font-weight:700;letter-spacing:-.01em;color:var(--ink);}
.diaryday-place{font-size:12px;color:var(--muted);font-weight:600;}
.jcard{display:flex;gap:13px;background:var(--surface);border-radius:16px;padding:15px;margin-bottom:9px;box-shadow:var(--shadow);}
.jcard-icon{width:34px;height:34px;flex:none;border-radius:9px;background:var(--fill);display:flex;align-items:center;justify-content:center;}
.jcard-body{flex:1;min-width:0;}.jcard-title{font-size:16.5px;font-weight:600;line-height:1.2;letter-spacing:-.01em;}
.jcard-body.editable{cursor:pointer;}
.vint{font-family:var(--mono);font-size:13px;color:var(--muted);font-weight:400;}
.jcard-note{font-size:14px;color:var(--ink2);margin-top:5px;line-height:1.45;}
.jcard-rate{display:flex;align-items:center;gap:14px;margin-top:10px;flex-wrap:wrap;}.mini{display:flex;align-items:center;gap:3px;}.mini-l{font-size:11px;color:var(--muted);margin-right:3px;font-weight:500;}
.del{background:none;color:var(--muted);cursor:pointer;padding:5px;flex:none;transition:.12s;}.del:active{color:var(--ink);transform:scale(.9);}
.photopicker{margin:7px 0 8px;}.photobtn{display:inline-flex;align-items:center;gap:7px;background:var(--fill);color:var(--ink);border-radius:12px;padding:11px 13px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:7px;}.photobtn input{display:none;}
.photochips,.photogrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:10px;}.photochip,.photogrid button{position:relative;aspect-ratio:1;background:var(--fill);border-radius:12px;overflow:hidden;cursor:pointer;}.photochip img,.photogrid img{width:100%;height:100%;object-fit:cover;display:block;}.photochip span{position:absolute;right:4px;top:3px;background:rgba(29,29,31,.72);color:white;border-radius:999px;width:18px;height:18px;line-height:17px;font-size:14px;}
.recapphotos{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px;}.recapphotos img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:14px;background:var(--fill);}
.capturelead,.sharehero{display:flex;align-items:flex-start;gap:10px;background:var(--powder);color:var(--accent);border-radius:16px;padding:13px 14px;margin-bottom:12px;font-size:14px;font-weight:700;}.sharehero span{display:block;color:var(--ink2);font-size:12.5px;font-weight:500;margin-top:3px;line-height:1.35;}
.shareblock{margin-bottom:16px;}.section-label.tight{margin-top:10px;}.memberlist{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}.memberrow{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--surface);border-radius:14px;padding:12px 13px;box-shadow:var(--shadow);}.memberemail{font-size:14px;font-weight:700;color:var(--ink);}
.recaphero,.publichero{background:linear-gradient(135deg,#FFFFFF 0%,#EEF1F6 100%);border-radius:22px;padding:22px;margin-bottom:12px;box-shadow:var(--shadow);}.recaphero h2{font-family:var(--serif);font-size:28px;line-height:1.05;letter-spacing:-.025em;margin:6px 0 8px;}.bestline{display:flex;align-items:center;gap:7px;color:var(--accent);font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.02em;margin-bottom:8px;}
.publicrecap{padding:22px 20px 34px;min-height:100vh;background:var(--bg);}
.viewer{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.86);display:flex;align-items:center;justify-content:center;padding:18px;}.viewer img{max-width:100%;max-height:82vh;border-radius:16px;}.viewer-x{position:absolute;top:calc(16px + env(safe-area-inset-top));right:16px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.18);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.viewer-dots{position:absolute;bottom:calc(26px + env(safe-area-inset-bottom));left:0;right:0;display:flex;justify-content:center;gap:8px;}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.35);cursor:pointer;padding:0;transition:.15s;}
.dot.on{background:#fff;}
.capturefab{position:fixed;right:calc(50% - 246px);bottom:calc(82px + env(safe-area-inset-bottom));z-index:31;display:flex;align-items:center;gap:7px;background:var(--accent);color:#fff;border-radius:999px;padding:12px 15px;font-size:14px;font-weight:800;font-family:var(--sans);box-shadow:var(--shadow-float);cursor:pointer;}
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:rgba(255,255,255,.82);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);box-shadow:0 -1px 0 rgba(0,0,0,.04);display:flex;z-index:30;padding:9px 4px calc(9px + env(safe-area-inset-bottom));}
.tab{flex:1;min-width:0;background:none;display:flex;flex-direction:column;align-items:center;gap:4px;padding:5px 2px;cursor:pointer;color:var(--muted);font-family:var(--sans);transition:.12s;}.tab span{font-size:10px;font-weight:500;}.tab.active{color:var(--accent);}.tab:active{transform:scale(.93);}
.toast{position:fixed;bottom:92px;left:50%;transform:translateX(-50%);background:rgba(29,29,31,.92);backdrop-filter:blur(12px);color:#fff;font-size:14px;font-weight:500;padding:11px 20px;border-radius:14px;z-index:40;animation:rise .25s;box-shadow:var(--shadow-float);}
.citytabs{display:flex;gap:0;background:var(--fill);border-radius:12px;padding:3px;margin-bottom:10px;}
.citytabs.scrollx{overflow-x:auto;}
.citytab{flex:1;min-width:max-content;background:transparent;border-radius:9px;padding:9px 12px;font-size:13px;font-weight:500;color:var(--ink2);cursor:pointer;transition:.15s;font-family:var(--sans);white-space:nowrap;}.citytab.on{background:var(--surface);color:var(--accent);box-shadow:0 1px 3px rgba(0,0,0,.12);font-weight:600;}
.city-meta{font-size:12.5px;color:var(--muted);margin:0 6px 14px;}.vibebar{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:8px;}.vibechip{flex:none;background:var(--fill);color:var(--ink2);border-radius:999px;padding:7px 13px;font-size:12.5px;font-weight:500;cursor:pointer;white-space:nowrap;transition:.15s;font-family:var(--sans);}.vibechip.on{background:var(--accent);color:#fff;}
.placecard{display:flex;gap:11px;background:var(--surface);border-radius:14px;padding:14px;margin-bottom:9px;box-shadow:var(--shadow);transition:.15s;}.placecard.been{background:var(--powder);}.placecheck{background:none;padding:0;cursor:pointer;flex:none;margin-top:1px;}.place-body{flex:1;min-width:0;}.place-top{display:flex;align-items:center;justify-content:space-between;gap:8px;}.place-name{font-size:15.5px;font-weight:600;letter-spacing:-.01em;}
.vibetag{flex:none;background:var(--powder);color:var(--accent);border-radius:999px;padding:3px 9px;font-size:11px;font-weight:600;white-space:nowrap;}.vibetag.inline{margin-left:8px;padding:1px 8px;font-size:10px;vertical-align:middle;}
.place-actions{margin-top:10px;}.addday,.planpill{display:inline-flex;align-items:center;gap:6px;border-radius:9px;padding:7px 12px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:var(--sans);}.addday{background:var(--accent);color:#fff;}.planpill{background:var(--fill);color:var(--ink);}.daypicker{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px;}.dpbtn{background:var(--fill);color:var(--ink);border-radius:9px;padding:8px 11px;font-size:12.5px;font-weight:500;cursor:pointer;font-family:var(--sans);}.dpbtn.on{background:var(--accent);color:#fff;}.dpbtn.clear{background:transparent;color:var(--muted);}
.addplace{width:100%;display:flex;align-items:center;justify-content:center;gap:7px;background:var(--fill);color:var(--ink);border-radius:12px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--sans);margin-top:6px;}.btnrow{display:flex;gap:8px;}.primary.grow{width:auto;flex:1;}.ghostbtn{background:var(--fill);color:var(--ink2);border-radius:14px;padding:13px 18px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--sans);flex:none;}.ghostbtn.sm{padding:8px 13px;border-radius:10px;}.ghostbtn.block{width:100%;margin-top:8px;}
.nudge{width:100%;display:flex;align-items:center;gap:9px;background:var(--powder);color:var(--accent);border-radius:14px;padding:13px 15px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--sans);margin-bottom:12px;}.prompt-q{font-family:var(--serif);font-size:17px;font-weight:600;letter-spacing:-.01em;margin-bottom:10px;}
.privsec{background:var(--surface);border-radius:18px;padding:15px 16px;margin-bottom:10px;box-shadow:var(--shadow);border:1px solid var(--powder2);}
.daycard-body .privsec{margin:4px 0 12px;}
.privhead{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;letter-spacing:.02em;color:var(--accent);text-transform:uppercase;margin-bottom:10px;}
.privgroup{margin-bottom:10px;}
.privgroup-label{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--ink2);margin-bottom:5px;}
.privrow{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-top:1px solid var(--line);}
.privrow:first-of-type{border-top:none;}
.privrow-body{flex:1;min-width:0;}
.privrow-title{font-size:14.5px;font-weight:600;color:var(--ink);letter-spacing:-.01em;}
.privadd{display:inline-flex;align-items:center;gap:6px;background:var(--fill);color:var(--ink);border-radius:10px;padding:8px 12px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);margin-top:4px;}
.privadd-form{margin-top:10px;}
.authwrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg);}
.authcard{width:100%;max-width:360px;background:var(--surface);border-radius:22px;padding:28px 24px;box-shadow:var(--shadow-float);text-align:center;}
.authbrand{font-family:var(--serif);font-size:28px;font-weight:700;letter-spacing:-.03em;}
.authsub{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.06em;margin:4px 0 22px;}
.authinput{width:100%;background:var(--fill);border-radius:12px;padding:13px;font-size:15px;font-family:var(--sans);color:var(--ink);margin-bottom:10px;}
.autherr{font-size:13px;color:#B25000;margin-bottom:10px;font-weight:600;}
.authok{font-size:13px;color:#0E7C7B;margin-bottom:10px;font-weight:600;}
.viewerbtn{background:none;color:var(--accent);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);margin-top:14px;padding:6px;}
.authnote{font-size:12px;color:var(--muted);margin-top:14px;line-height:1.4;}
input,select,textarea,button{font-family:inherit;}select{appearance:none;-webkit-appearance:none;}
.stalebanner{display:block;width:100%;text-align:left;background:#FFF1E2;color:#B25000;border-radius:12px;padding:10px 12px;font-size:12.5px;font-weight:600;line-height:1.35;margin-top:8px;cursor:pointer;font-family:var(--sans);}
.planrow{display:flex;align-items:center;}
.planrow .checkrow{flex:1;}
.mapday{display:flex;align-items:center;justify-content:center;gap:7px;background:var(--powder);color:var(--accent);border-radius:14px;padding:12px;font-size:14px;font-weight:600;margin:2px 0 10px;text-decoration:none;font-family:var(--sans);}
.mapday:active{background:var(--powder2);}
.mapday.sm{padding:10px;font-size:13px;border-radius:12px;margin:8px 0 2px;}
.sheet{position:fixed;inset:0;z-index:70;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;overscroll-behavior:contain;}
.sheetcard{width:100%;max-width:520px;background:var(--bg);border-radius:22px 22px 0 0;padding:18px 16px calc(18px + env(safe-area-inset-bottom));max-height:82dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;animation:sheetup .28s cubic-bezier(.2,.8,.2,1);}.sheetcard .primary{position:sticky;bottom:calc(8px + env(safe-area-inset-bottom));z-index:2;box-shadow:var(--shadow-float);}
@keyframes sheetup{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
.sheethead{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sheettitle{font-family:var(--serif);font-size:20px;font-weight:700;letter-spacing:-.02em;}
.sheetx{width:30px;height:30px;border-radius:50%;background:var(--fill2);color:var(--ink2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none;}
.photogrid.edit{margin-bottom:10px;}
.photoeditcell{position:relative;aspect-ratio:1;border-radius:12px;overflow:hidden;background:var(--fill);}
.photoeditcell img{width:100%;height:100%;object-fit:cover;display:block;}
.photox{position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:999px;background:rgba(29,29,31,.75);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;}
/* My trips + wizard */
.tripcard{display:flex;gap:12px;align-items:center;background:var(--surface);border-radius:18px;padding:17px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer;transition:.12s;}
.tripcard:active{transform:scale(.99);}
.tripcard-body{flex:1;min-width:0;}
.tripcard-name{font-family:var(--serif);font-size:20px;font-weight:700;letter-spacing:-.02em;line-height:1.1;}
.tripcard-meta{font-size:13px;color:var(--ink2);margin-top:4px;}
.tripcard-sub{display:flex;gap:14px;margin-top:9px;}
.tripcard-sub span{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);font-weight:500;}
.newtrip{margin-top:14px;}
.emptytrips{text-align:center;padding:40px 20px 28px;}
.emptytrips-icon{width:64px;height:64px;border-radius:20px;background:var(--powder);color:var(--accent);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
.emptytrips-h{font-family:var(--serif);font-size:22px;font-weight:700;letter-spacing:-.02em;margin-bottom:6px;}
.chips{display:flex;flex-wrap:wrap;gap:7px;}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--powder);color:var(--accent);border-radius:999px;padding:6px 8px 6px 13px;font-size:13px;font-weight:600;}
.chip button{background:rgba(65,89,156,.18);color:var(--accent);border-radius:999px;width:18px;height:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.resolved{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.resolved>div{display:flex;flex-direction:column;font-size:15px;font-weight:600;gap:2px;}
.resolved>div svg{color:var(--accent);vertical-align:-2px;margin-right:5px;}
.destrow{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line);}
.destrow-body{flex:1;min-width:0;}
.destrow-city{font-size:15px;font-weight:600;}
.destadd{margin-top:12px;}
.destadd-row{display:flex;gap:8px;align-items:center;}
.destadd-row .inline-input{margin-top:0;flex:none;}
.destadd-row .primary.grow{margin-top:0;}
.daterow{display:flex;gap:12px;}
.daterow label{flex:1;display:flex;flex-direction:column;font-size:12px;color:var(--muted);font-weight:600;gap:2px;}
.daterow .inline-input{width:100%;}
/* card grids are plain stacks on mobile; become multi-column on desktop */
.cardgrid{}
/* ===== desktop / laptop layout ===== */
@media (min-width:1000px){
  body{background:linear-gradient(180deg,#EAEEF7 0%,#F4F7FC 100%);}
  .app{max-width:980px;min-height:100vh;background:var(--bg);box-shadow:0 0 0 1px rgba(16,24,40,.04),0 30px 90px rgba(16,24,40,.10);}
  .topbar{padding-left:34px;padding-right:34px;}
  .scroll{padding-bottom:128px;}
  .scroll.solo{padding-bottom:40px;}
  .page{max-width:720px;margin:0 auto;padding:24px 24px 8px;}
  .page.wide{max-width:940px;}
  .page-h{font-size:34px;}
  .cardgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(264px,1fr));gap:12px;align-items:start;}
  .cardgrid>*{margin-bottom:0 !important;}
  .daycard{animation:none;}
  /* floating pill nav, centred to the app */
  .tabbar{width:auto;max-width:460px;left:50%;transform:translateX(-50%);bottom:22px;border-radius:22px;padding:8px 10px calc(8px + env(safe-area-inset-bottom));box-shadow:0 12px 40px rgba(16,24,40,.18);border:1px solid var(--line);background:rgba(255,255,255,.9);}
  .tab{padding:6px 16px;}
  /* keep prominent CTAs from stretching too wide */
  .primary.newtrip,.addplace{width:auto;min-width:240px;margin-left:auto;margin-right:auto;}
  .hero{padding:26px;}
}
@media (min-width:1280px){
  .app{max-width:1080px;}
  .page.wide{max-width:1040px;}
}
